<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 활용 교수법 프로그램 신청 - 경상국립대학교</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans KR (포스터 느낌의 아주 굵은 폰트 사용을 위해 900 웨이트 추가) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        poster: {
                            blue: '#1A3673',   // 포스터의 메인 딥 블루
                            lime: '#D4F033',   // 포스터의 네온 라임
                            teal: '#129BB3',   // 포스터의 청록색
                            dark: '#0f172a'
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans KR', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #1A3673; 
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* 포스터의 유기적인 S자 모양 그래디언트 형태 구현 */
        .poster-blob {
            position: fixed;
            top: 10%;
            right: -15%;
            width: 80vw;
            height: 90vh;
            background: linear-gradient(135deg, #D4F033 0%, #129BB3 100%);
            border-radius: 43% 57% 65% 35% / 45% 61% 39% 55%;
            z-index: -1;
            opacity: 0.95;
            animation: morph 15s ease-in-out infinite alternate;
        }
        @keyframes morph {
            0% { border-radius: 43% 57% 65% 35% / 45% 61% 39% 55%; transform: scale(1) rotate(0deg); }
            100% { border-radius: 55% 45% 35% 65% / 50% 40% 60% 50%; transform: scale(1.05) rotate(5deg); }
        }
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1A3673; }
        ::-webkit-scrollbar-thumb { background: #129BB3; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4F033; }
        
        /* 폼 요소 포커스 스타일 */
        .form-input:focus {
            border-color: #129BB3;
            box-shadow: 0 0 0 3px rgba(18, 155, 179, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen">

    <!-- 포스터 스타일 백그라운드 도형 -->
    <div class="poster-blob"></div>

    <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8 relative z-10">
        
        <!-- Header: 포스터 타이포그래피 스타일 -->
        <div class="mb-10 text-white break-keep">
            <div class="inline-block px-4 py-1 border-2 border-white rounded-full text-sm font-bold tracking-widest mb-6">
                2026학년도 1학기 역량강화
            </div>
            <h1 class="text-5xl md:text-6xl font-black text-poster-lime leading-[1.1] tracking-tight mb-4">
                AI 활용 교수법 프로그램<br/>참여 교원 모집
            </h1>
            <p class="text-lg md:text-xl font-medium text-white/90 mt-4 border-l-4 border-poster-teal pl-4 py-1">
                미래 교육을 선도하는 경상국립대학교 교원 워크숍<br/>
                <span class="text-poster-lime font-bold">지금 바로 신청하세요!</span>
            </p>
        </div>

        <!-- Form Content (가독성을 위해 화이트 카드로 분리) -->
        <form id="applicationForm" class="bg-white rounded-3xl p-8 md:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.3)] space-y-12">
            
            <!-- Section 1: 워크숍 선택 -->
            <section>
                <div class="flex items-center mb-6">
                    <span class="bg-poster-blue text-white font-black text-xl w-10 h-10 flex items-center justify-center rounded-xl mr-3 shadow-md">1</span>
                    <h2 class="text-2xl font-black text-poster-blue tracking-tight">모집분야 (프로그램 선택)</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5" id="workshopGrid">
                    <!-- Cards will be rendered here by JS -->
                </div>
            </section>

            <!-- Section 2: 신청자 정보 -->
            <section>
                <div class="flex items-center mb-6">
                    <span class="bg-poster-blue text-white font-black text-xl w-10 h-10 flex items-center justify-center rounded-xl mr-3 shadow-md">2</span>
                    <h2 class="text-2xl font-black text-poster-blue tracking-tight">접수정보 (신청자 정보)</h2>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 bg-gray-50 p-6 md:p-8 rounded-2xl border border-gray-100">
                    <div>
                        <label for="empId" class="block text-sm font-bold text-gray-700 mb-2">교번 <span class="text-red-500">*</span></label>
                        <input type="text" id="empId" name="empId" required class="form-input w-full p-3 border-2 border-gray-200 rounded-xl transition-all">
                    </div>
                    <div>
                        <label for="name" class="block text-sm font-bold text-gray-700 mb-2">성명 <span class="text-red-500">*</span></label>
                        <input type="text" id="name" name="name" required class="form-input w-full p-3 border-2 border-gray-200 rounded-xl transition-all">
                    </div>
                    <div>
                        <label for="college" class="block text-sm font-bold text-gray-700 mb-2">단과대학 <span class="text-red-500">*</span></label>
                        <input type="text" id="college" name="college" required class="form-input w-full p-3 border-2 border-gray-200 rounded-xl transition-all">
                    </div>
                    <div>
                        <label for="department" class="block text-sm font-bold text-gray-700 mb-2">학과 <span class="text-red-500">*</span></label>
                        <input type="text" id="department" name="department" required class="form-input w-full p-3 border-2 border-gray-200 rounded-xl transition-all">
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-bold text-gray-700 mb-2">연락처 <span class="text-red-500">*</span></label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{2,3}-[0-9]{3,4}-[0-9]{4}" placeholder="010-1234-5678" required class="form-input w-full p-3 border-2 border-gray-200 rounded-xl transition-all">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-bold text-gray-700 mb-2">이메일 (주사용) <span class="text-red-500">*</span></label>
                        <input type="email" id="email" name="email" required class="form-input w-full p-3 border-2 border-gray-200 rounded-xl transition-all">
                    </div>
                </div>
            </section>

            <!-- 안내 및 유의사항 -->
            <div class="bg-poster-teal/10 border-2 border-poster-teal rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -bottom-4 opacity-10">
                    <svg width="120" height="120" viewBox="0 0 24 24" fill="currentColor" class="text-poster-teal"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                </div>
                <h3 class="text-lg font-black text-poster-teal mb-2">※ 참여 인정 안내</h3>
                <p class="text-sm md:text-base text-gray-800 font-medium relative z-10">
                    워크숍에 <span class="font-bold underline decoration-poster-lime decoration-4 underline-offset-4">대면으로 참여한 교원</span>에 한해 교수법 프로그램 참여가 최종 인정됩니다. 일정 확인 후 신중한 접수 부탁드립니다. </br> 문의: 교육혁신처 AI센터 선임연구원 (055-772-4857 또는 240907@gnu.ac.kr)
                </p>
            </div>

            <!-- Submit Button -->
            <div class="pt-4">
                <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-5 px-6 border-none rounded-2xl text-xl font-black text-poster-blue bg-poster-lime hover:bg-[#c2de25] shadow-lg transform transition-transform active:scale-[0.98]">
                    <span id="btnText">온라인 접수하기</span>
                    <svg id="loadingSpinner" class="hidden animate-spin ml-3 h-6 w-6 text-poster-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <!-- Message Modal -->
    <div id="messageModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-poster-blue/80 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform transition-all text-center relative overflow-hidden">
            <!-- Modal top decoration -->
            <div class="absolute top-0 left-0 w-full h-3 bg-poster-lime"></div>
            
            <div id="modalIcon" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-gray-100 mb-5">
                <!-- Icon injected by JS -->
            </div>
            <h3 id="modalTitle" class="text-2xl font-black text-poster-blue mb-3 tracking-tight">알림</h3>
            <p id="modalMessage" class="text-gray-600 mb-8 font-medium leading-relaxed"></p>
            <button type="button" onclick="closeModal()" class="w-full inline-flex justify-center rounded-xl px-6 py-3 bg-poster-blue text-lg font-bold text-white hover:bg-poster-teal transition-colors">
                확인
            </button>
        </div>
    </div>

    <script>
        // --- [설정] 배포된 Google Apps Script Web App URL을 여기에 입력하세요 ---
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw-5v3JAUKF9fb-bxdnNCes_TW1-lwJ_2kd9SogYf2UbeHI4B_3d3r_r8zvuOlf9FLG/exec'; 

        // 워크숍 데이터 목록
        const workshops = [
            { id: 'ws1', title: '[초급] 생성형 AI 수업 적용 및 실험</br>   </br>(접수 마감)</br>(대기자 접수가능)' , date: "'26. 4. 22.(수) 11:00 ~ 14:00", instructor: '윤혜식 대표 (2Miles)', location: 'ICT융합센터 10층 자율전공학부 PBL강의실', quota: '20명', desc: 'Google NotebookLM을 활용한 요약 등 수업 적용법, 학생 자기주도 학습 도구로서의 생성형 AI 활용법' },
            { id: 'ws2', title: '[중급] AI 생성 텍스트와 학습자의 문체 비교 분석을 위한 RAG 도구 개발</br>   </br>(접수 마감)</br>(대기자 접수가능)', date: "'26. 4. 27.(월) 16:30~18:30", instructor: '최영복 강사 (레이즈)', location: '정보전산처(4동) 1층 하이플렉스 강의실', quota: '20명', desc: 'Google NotebookLM 활용 문체 진단 질의응답 도구 제작, GPTs/Claude 활용 글쓰기 개선 챗봇 제작 및 프롬프트 설계' },
            { id: 'ws3', title: '[고급2] Al Agent를 활용한 학습 환류 시스템', date: "'26. 5. 7.(목) 14:30~16:30", instructor: '이성원 선생님 (경남교육청)', location: '정보전산처(4동) 1층 하이플렉스 강의실', quota: '20명', desc: 'RAG기반 형성평가 문항 자동 생성, 학생 오답 유형별 피드백 생성 및 문제 해결 전략 안내 Agent 제작' },
            { id: 'ws4', title: '[고급2] MCP 기반 AI 에이전트를 활용한 연구형 교수법 개발</br>   </br>(접수 마감)', date: "'26. 4. 29.(수) 16:30 ~ 18:30", instructor: '연정호 박사 (SK하이닉스)', location: '정보전산처(4동) 1층 하이플렉스 강의실', quota: '20명', desc: 'Obsidian 활용 학술검색/지식관리, Claude/NanoBanana 활용 문서 자동 생성 및 데이터 시각화 전략' },
            { id: 'ws5', title: '[고급2] AI 에이전트를 활용한 자연과학 분야 맞춤형 강의 보조도구 설계 및 제작', date: "'26. 4. 30.(목) 15:00 ~ 17:00", instructor: '이성원 선생님 (경남교육청)', location: '정보전산처(4동) 1층 하이플렉스 강의실', quota: '20명', desc: 'Claude 활용 분자구조 분석 및 시각화, Notebook LM 활용 자율학습 도우미 Agent 제작' }
        ];

        // 워크숍 카드 렌더링 함수 (포스터 스타일)
        function renderWorkshops() {
            const grid = document.getElementById('workshopGrid');
            workshops.forEach((ws, index) => {
                const cardHtml = `
                    <div class="relative">
                        <input type="radio" name="selectedWorkshop" id="${ws.id}" value="${ws.id}" class="peer sr-only" ${index === 0 ? 'required' : ''}>
                        <label for="${ws.id}" class="block p-5 h-full bg-white border-2 border-gray-200 rounded-2xl cursor-pointer transition-all duration-200 hover:border-poster-teal/50 peer-checked:border-poster-blue peer-checked:ring-4 peer-checked:ring-poster-lime peer-checked:bg-blue-50/30">
                            <div class="flex flex-col h-full relative z-10">
                                <h3 class="text-lg font-black text-poster-blue mb-3 leading-snug break-keep">${ws.title}</h3>
                                <ul class="text-sm font-medium text-gray-600 space-y-1.5 mb-4 flex-grow">
                                    <li class="flex"><span class="w-10 font-bold text-gray-800 shrink-0">일시</span> ${ws.date}</li>
                                    <li class="flex"><span class="w-10 font-bold text-gray-800 shrink-0">강사</span> ${ws.instructor}</li>
                                    <li class="flex"><span class="w-10 font-bold text-gray-800 shrink-0">장소</span> ${ws.location}</li>
                                    <li class="flex"><span class="w-10 font-bold text-gray-800 shrink-0">인원</span> <span class="text-poster-teal font-bold">${ws.quota}</span></li>
                                </ul>
                                <div class="text-xs text-gray-600 bg-gray-100 p-3 rounded-xl border border-gray-200 leading-relaxed">
                                    <span class="font-bold text-poster-blue block mb-1">📋 주요내용</span>
                                    ${ws.desc}
                                </div>
                            </div>
                            <!-- Checked Indicator -->
                            <div class="absolute top-4 right-4 hidden peer-checked:block text-poster-lime bg-poster-blue rounded-full p-1 shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                                </svg>
                            </div>
                        </label>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            renderWorkshops();
            
            // 전화번호 하이픈 자동 삽입
            const phoneInput = document.getElementById('phone');
            phoneInput.addEventListener('input', function(e) {
                let val = this.value.replace(/[^0-9]/g, '');
                if(val.length > 3 && val.length <= 7) {
                    this.value = val.slice(0,3) + '-' + val.slice(3);
                } else if(val.length > 7) {
                    this.value = val.slice(0,3) + '-' + val.slice(3,7) + '-' + val.slice(7,11);
                }
            });
        });

        // 폼 제출 핸들러
        document.getElementById('applicationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (GAS_WEB_APP_URL === 'YOUR_WEB_APP_URL_HERE') {
                showModal('error', '설정 오류', 'Google Apps Script 배포 URL이 설정되지 않았습니다.');
                return;
            }

            const form = e.target;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = '접수 진행 중...';
            spinner.classList.remove('hidden');

            const selectedId = form.selectedWorkshop.value;
            const workshopObj = workshops.find(ws => ws.id === selectedId);

            const payload = {
                workshopName: workshopObj.title,
                workshopDate: workshopObj.date,
                empId: form.empId.value,
                name: form.name.value,
                college: form.college.value,
                department: form.department.value,
                phone: form.phone.value,
                email: form.email.value
            };

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.result === 'success') {
                    showModal('success', '접수 완료', '접수가 성공적으로 완료되었습니다. 신청결과를 기입하신 메일로 보내드립니다.');
                    form.reset();
                } else {
                    throw new Error(result.message || '서버 응답 오류');
                }
            } catch (error) {
                console.error('Submission Error:', error);
                showModal('error', '접수 실패', '접수 처리 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnText.textContent = '온라인 접수하기';
                spinner.classList.add('hidden');
            }
        });

        // 모달 제어 함수
        function showModal(type, title, message) {
            const modal = document.getElementById('messageModal');
            const iconContainer = document.getElementById('modalIcon');
            const titleEl = document.getElementById('modalTitle');
            const messageEl = document.getElementById('modalMessage');

            titleEl.textContent = title;
            messageEl.textContent = message;

            if (type === 'success') {
                iconContainer.className = 'mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-poster-lime/20 mb-5 text-poster-teal';
                iconContainer.innerHTML = '<svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
            } else {
                iconContainer.className = 'mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-5 text-red-600';
                iconContainer.innerHTML = '<svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>';
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('messageModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>
</html>
